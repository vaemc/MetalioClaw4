## IDF Component Manager Manifest File
dependencies:
  waveshare/esp_lcd_sh8601: 1.0.2
  espressif/esp_lcd_ili9341: ==1.2.0
  espressif/esp_lcd_gc9a01: ==2.0.1
  espressif/esp_lcd_st77916: ^1.0.1
  espressif/esp_lcd_axs15231b: ^1.0.0

  espressif/esp_lcd_st7701:
    version: ^1.1.4
    rules:
    - if: target in [esp32s3, esp32p4]
  espressif/esp_lcd_st7796:
    version: 1.3.5
    rules:
    - if: target in [esp32, esp32s2, esp32s3, esp32p4]
  espressif/esp_lcd_spd2010: ==1.0.2
  espressif/esp_io_expander_tca9554: ==2.0.0
  espressif/esp_lcd_panel_io_additions: ^1.0.1
  78/esp_lcd_nv3023: ~1.0.0
  78/esp-wifi-connect: ~2.6.2
  78/esp-opus-encoder: ~2.4.1
  78/esp-ml307: ~3.5.1
  78/xiaozhi-fonts: ~1.5.5
  espressif/led_strip: ~3.0.1
  espressif/esp_codec_dev: ~1.5
  espressif/esp-sr: ~2.2.0
  espressif/button: ~4.1.3
  espressif/knob: ^1.0.0
  espressif/esp_video: ^2.1.0
  espressif/esp_image_effects:
    version: ^1.0.1
    rules:
    - if: target not in [esp32]
  espressif/esp_lcd_touch_ft5x06: ~1.0.7
  espressif/esp_lcd_touch_gt911: ^1
  espressif/esp_lcd_touch_gt1151: ^1
  waveshare/esp_lcd_touch_cst9217: ^1.0.3
  espressif/esp_lcd_touch_cst816s: ^1.0.6
  lvgl/lvgl: ~9.3.0
  esp_lvgl_port: ~2.6.0
  espressif/esp_io_expander_tca95xx_16bit: ^2.0.0
  espressif2022/image_player: ^1.1.1
  # espressif2022/esp_emote_gfx: ^1.1.2
  espressif/adc_mic: ^0.2.1
  espressif/esp_mmap_assets: '>=1.2'
  txp666/otto-emoji-gif-component:
    version: ^1.0.3
    rules:
    - if: target in [esp32s3]
  espressif/adc_battery_estimation: ^0.2.0
  espressif/esp_new_jpeg: ^1.0.1

  # SenseCAP Watcher Board
  wvirgil123/sscma_client:
    version: 1.0.2
    rules:
    - if: target in [esp32s3]

  tny-robotics/sh1106-esp-idf: ^1.0.0
  waveshare/esp_lcd_jd9365_10_1:
    version: '*'
    rules:
    - if: target in [esp32p4]
  waveshare/esp_lcd_st7703:
    version: '*'
    rules:
    - if: target in [esp32p4]
  espressif/esp32_p4_function_ev_board:
    version: ^5.0.3
    rules:
    - if: target in [esp32p4]
  espressif/esp_lcd_ili9881c:
    version: ^1.0.1
    rules:
    - if: target in [esp32p4]
  espressif/esp_lcd_ek79007:
    version: ^1.0.3
    rules:
    - if: target in [esp32p4]
  espressif/esp_hosted:
    version: 2.12.3
    rules:
    - if: target in [esp32h2, esp32p4]
  espressif/esp_wifi_remote: ^1.5.3
  espfriends/servo_dog_ctrl:
    version: ^0.1.8
    rules:
    - if: target in [esp32c3]

  llgok/cpp_bus_driver:
    version: 1.1.0
    rules:
    - if: target in [esp32p4]

  ## Required IDF version
  idf:
    # 提到 5.5.2：原 78/uart-eth-modem (已下沉到 boards/common) 要求 >= 5.5.2，
    # 它的依赖 78/uart-uhci 同样需要 5.5.2 的 UHCI driver。
    version: '>=5.5.2'
  espressif/esp_lcd_touch_st7123: ^1.0.0
  espressif/esp_lvgl_adapter: ^0.5.0
  espressif/esp_lv_eaf_player: ^0.3.0
  # 78/uart-eth-modem 源码已复制到 main/boards/common/uart_eth_modem.{h,cc}，
  # 这里只保留它原本声明的两个底层依赖（idf 版本要求合并到上方 idf 段）。
  78/uart-uhci: ~0.2.1
  espressif/iot_eth: ^0.1.0
  espressif/esp_audio_simple_player: ^0.9.6~1
  espressif/gmf_audio: ^0.8.1
  espressif/gmf_io: ^0.8.0
  # HLS（m3u8）电台：为 esp_audio_simple_player 注册 io_hls
  # 钉 1.0.2：1.0.3 要求 gmf_io^1.0，与本工程 gmf_io^0.8 / simple_player 不兼容
  espressif/esp_hls_stream: ==1.0.2
  # 电台页频谱律动（Q15 实数 FFT）
  espressif/gmf_fft: ^1.0.0
  # SD 卡页虚拟 U 盘（TinyUSB MSC）；仅 P4 板使用 GPIO24/25 与 USJ 切换
  espressif/esp_tinyusb:
    version: ^2.0.0
    rules:
    - if: target in [esp32p4]